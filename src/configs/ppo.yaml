algorithm: PPO
num_steps_per_env: 24
max_iterations: 3000
save_interval: 100

policy:
  class_name: ActorCritic
  actor_hidden_dims: [512, 256, 128]
  critic_hidden_dims: [512, 256, 128]
  activation: elu

ppo:
  value_loss_coef: 1.0
  use_clipped_value_loss: true
  clip_param: 0.2
  entropy_coef: 0.01
  num_learning_epochs: 5
  num_mini_batches: 4
  learning_rate: 1.0e-3
  schedule: adaptive
  gamma: 0.99
  lam: 0.95
  desired_kl: 0.01
  max_grad_norm: 1.0

episode:
  length_steps: 1000

env:
  num_envs: 4096
